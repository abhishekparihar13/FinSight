{% extends 'base.html' %}

{% block title %}Add Goal{% endblock %}
{% block page_title %}Add Goal{% endblock %}

{% block content %}
<div class="max-w-[480px] mx-auto mt-8">
    <div class="mb-6">
        <a href="{% url 'list_goals' %}" class="flex items-center gap-2 text-muted hover:text-light transition-colors text-sm font-medium w-fit">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Goals
        </a>
    </div>

    <div class="glass-card p-8 sm:p-10 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-bl-full pointer-events-none"></div>

        <div class="relative z-10">
            <h2 class="text-2xl font-bold text-light mb-8 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center text-primary">
                    <i data-lucide="target" class="w-5 h-5"></i>
                </div>
                Create Goal
            </h2>

            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <!-- Name Field -->
                <div class="relative">
                    <input type="text" name="name" required
                        class="form-input block w-full px-4 pt-6 pb-2 text-light bg-surface-elevated border border-white/10 rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer" placeholder=" " />
                    <label class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 pointer-events-none">Goal Name</label>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <!-- Start Date Field -->
                    <div class="relative">
                        <input type="date" name="start_date" required
                            class="form-input block w-full px-4 pt-6 pb-2 text-light bg-surface-elevated border border-white/10 rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer" placeholder=" " />
                        <label class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 pointer-events-none">Start Date</label>
                    </div>

                    <!-- End Date Field -->
                    <div class="relative">
                        <input type="date" name="end_date" required
                            class="form-input block w-full px-4 pt-6 pb-2 text-light bg-surface-elevated border border-white/10 rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer" placeholder=" " />
                        <label class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 pointer-events-none">End Date</label>
                    </div>
                </div>

                <!-- Amount Field -->
                <div class="relative">
                    <input type="number" step="0.01" name="amount_to_save" required
                        class="form-input block w-full px-4 pt-6 pb-2 text-light bg-surface-elevated border border-white/10 rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer" placeholder=" " />
                    <label class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3 pointer-events-none">Target Amount</label>
                </div>

                <button type="submit" class="submit-btn w-full py-3.5 px-4 bg-gradient-to-r from-primary to-[#6D28D9] hover:from-[#6D28D9] hover:to-[#5B21B6] text-white font-medium rounded-lg transition-all shadow-lg shadow-primary/25 focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-dark mt-4">
                    Save Goal
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
