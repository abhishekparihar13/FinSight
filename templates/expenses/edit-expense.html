{% extends 'base.html' %} 

{% block title %}Edit Expense{% endblock %}
{% block page_title %}Edit Expense{% endblock %}

{% block content %}
<div class="max-w-[480px] mx-auto mt-8">
    <div class="mb-6 flex justify-between items-center">
        <a href="{% url 'expenses' %}" class="flex items-center gap-2 text-muted hover:text-light transition-colors text-sm font-medium w-fit">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Expenses
        </a>
        
        <form action="{% url 'expense-delete' expense.id %}" method="post" class="inline" onsubmit="return confirm('Are you sure you want to delete this expense?');">
            {% csrf_token %}
            <button type="submit" class="flex items-center gap-2 text-danger/80 hover:text-danger bg-danger/10 hover:bg-danger/20 px-3 py-1.5 rounded transition-colors text-sm font-medium">
                <i data-lucide="trash-2" class="w-4 h-4"></i> Delete
            </button>
        </form>
    </div>

    <div class="glass-card p-8 sm:p-10 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-bl-full pointer-events-none"></div>

        <div class="relative z-10">
            <h2 class="text-2xl font-bold text-light mb-8 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center text-primary">
                    <i data-lucide="edit-2" class="w-5 h-5"></i>
                </div>
                Edit Expense
            </h2>

            <form action="{% url 'expense-edit' expense.id %}" method="post" id="expense-form" class="space-y-6">
                {% csrf_token %}
                
                <!-- Amount Field -->
                <div class="relative">
                    <input type="number" step="0.01" name="amount" id="amountField" value="{{values.amount}}" required
                        class="form-input block w-full px-4 pt-6 pb-2 text-light bg-surface-elevated border border-white/10 rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer" placeholder=" " />
                    <label for="amountField" class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3">Amount</label>
                </div>

                <!-- Description Field -->
                <div class="relative">
                    <input type="text" name="description" id="description-input" value="{{values.description}}" required
                        class="form-input block w-full px-4 pt-6 pb-2 text-light bg-surface-elevated border border-white/10 rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer" placeholder=" " />
                    <label for="description-input" class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3">Description</label>
                </div>

                <!-- Category Field -->
                <div class="relative group">
                    <input type="text" name="category" id="category-input" value="{{values.category}}" required
                        class="form-input block w-full px-4 pt-6 pb-2 text-primary font-medium bg-surface-elevated border border-white/10 rounded-full appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer" placeholder=" " />
                    <label for="category-input" class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3">Category</label>
                    <i data-lucide="tag" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-muted pointer-events-none"></i>
                </div>

                <!-- Date Field -->
                <div class="relative">
                    <input type="date" name="expense_date" id="dateField" value="{{values.date |date:'Y-m-d' }}" required
                        class="form-input block w-full px-4 pt-6 pb-2 text-light bg-surface-elevated border border-white/10 rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer" placeholder=" " />
                    <label for="dateField" class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3">Date</label>
                </div>

                <input type="hidden" name="force_save" id="force-save-input" value="0">

                <button type="submit" class="submit-btn w-full py-3.5 px-4 bg-gradient-to-r from-primary to-[#6D28D9] hover:from-[#6D28D9] hover:to-[#5B21B6] text-white font-medium rounded-lg transition-all shadow-lg shadow-primary/25 focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-dark mt-4">
                    Save Changes
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Limit Preview Modal -->
<div id="limit-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm px-4">
    <div class="relative w-full max-w-md">
        <button id="modal-close-btn"
            class="absolute -top-3 -right-3 w-8 h-8 rounded-full bg-surface-elevated border border-white/10 flex items-center justify-center text-muted hover:text-light z-10">
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
        <div id="modal-content"></div>
    </div>
</div>
{% endblock %}

{% block js %}
<script>
function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
}

const expenseForm  = document.getElementById('expense-form');
const limitModal   = document.getElementById('limit-modal');
const modalContent = document.getElementById('modal-content');

expenseForm.addEventListener('submit', function (e) {
    const forceInput = document.getElementById('force-save-input');
    if (forceInput && forceInput.value === '1') return;

    e.preventDefault();
    const amount   = document.getElementById('amountField').value;
    const category = document.getElementById('category-input').value;
    const expenseId = "{{ expense.id }}";

    if (category && category.toLowerCase().includes('investment')) {
        expenseForm.submit();
        return;
    }

    const formData = new FormData();
    formData.append('amount', amount);
    formData.append('expense_id', expenseId);

    fetch('{% url "check-limit-preview" %}', {
        method: 'POST', body: formData,
        headers: { 'X-CSRFToken': getCookie('csrftoken') }
    })
    .then(r => r.json())
    .then(data => {
        const allowed = data.allow_overspending;
        let isBlocked = false;
        let isWarning = false;
        let modalHtml = '';

        if (data.tier_2_blocked) {
            isBlocked = true;
            modalHtml = `
                <div class="flex flex-col gap-4 md:flex-row">
                    <div class="flex-1 rounded-2xl border-2 border-red-500/60 bg-red-950/40 p-6">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="w-6 h-6 rounded-full border-2 border-red-400 flex items-center justify-center text-red-400 text-sm font-bold">✕</span>
                            <span class="text-red-400 font-bold text-base">Transaction Blocked</span>
                        </div>
                        <p class="text-sm text-gray-300 leading-relaxed">
                            This expense of <span class="font-semibold text-white">₹${amount}</span> would exceed your total available funds. You have <span class="font-semibold text-white">₹${data.cumulative_savings.toFixed(2)}</span> available across income and savings.
                        </p>
                        <button disabled class="mt-5 w-full py-2.5 rounded-xl bg-gray-700/60 text-gray-500 font-semibold text-sm cursor-not-allowed">
                            Save Expense — Blocked
                        </button>
                    </div>
                </div>`;
        } else if (data.tier_1_warning) {
            if (!allowed) {
                isBlocked = true;
                modalHtml = `
                    <div class="flex flex-col gap-4 md:flex-row">
                        <div class="flex-1 rounded-2xl border-2 border-red-500/60 bg-red-950/40 p-6">
                            <div class="flex items-center gap-2 mb-3">
                                <span class="w-6 h-6 rounded-full border-2 border-red-400 flex items-center justify-center text-red-400 text-sm font-bold">✕</span>
                                <span class="text-red-400 font-bold text-base">Transaction Blocked</span>
                            </div>
                            <p class="text-sm text-gray-300 leading-relaxed">
                                You have exceeded this month's income. Overspending is disabled. Enable it in Settings → Limits to draw from savings.
                            </p>
                            <button disabled class="mt-5 w-full py-2.5 rounded-xl bg-gray-700/60 text-gray-500 font-semibold text-sm cursor-not-allowed">
                                Save Expense — Blocked
                            </button>
                        </div>
                    </div>`;
            } else {
                isWarning = true;
                modalHtml = `
                    <div class="flex flex-col gap-4 md:flex-row">
                        <div class="flex-1 rounded-2xl border-2 border-yellow-500/60 bg-yellow-950/30 p-6">
                            <div class="flex items-center gap-2 mb-3">
                                <span class="text-yellow-400 text-xl">⚠</span>
                                <span class="text-yellow-400 font-bold text-base">Warning</span>
                            </div>
                            <p class="text-sm text-gray-300 leading-relaxed">
                                This expense exceeds your income for this month. You will be drawing <span class="font-bold text-yellow-300">₹${data.drawdown_amount.toFixed(2)}</span> from your savings. Available savings: <span class="font-semibold text-white">₹${data.cumulative_savings.toFixed(2)}</span>. Do you want to continue?
                            </p>
                            <div class="flex gap-3 mt-5">
                                <button type="button" class="w-full py-2.5 rounded-xl border border-white/10 hover:bg-white/5 text-light font-semibold text-sm transition-all" onclick="document.getElementById('limit-modal').classList.add('hidden');">
                                    Cancel
                                </button>
                                <button id="confirm-save-btn" class="w-full py-2.5 rounded-xl bg-gradient-to-r from-yellow-600 to-yellow-800 hover:from-yellow-700 hover:to-yellow-900 text-white font-semibold text-sm transition-all">
                                    Continue Anyway
                                </button>
                            </div>
                        </div>
                    </div>`;
            }
        } else if (data.breaches && data.breaches.length > 0) {
            const breachText = data.breaches.join(' and ');
            if (!allowed) {
                isBlocked = true;
                modalHtml = `
                    <div class="flex flex-col gap-4 md:flex-row">
                        <div class="flex-1 rounded-2xl border-2 border-red-500/60 bg-red-950/40 p-6">
                            <div class="flex items-center gap-2 mb-3">
                                <span class="w-6 h-6 rounded-full border-2 border-red-400 flex items-center justify-center text-red-400 text-sm font-bold">✕</span>
                                <span class="text-red-400 font-bold text-base">Expense Blocked</span>
                            </div>
                            <p class="text-sm text-gray-300 leading-relaxed">
                                This would exceed your <span class="font-semibold text-white">${breachText}</span> limit${data.breaches.length > 1 ? 's' : ''}.
                                To allow overspending, enable it in
                                <a href="/savings/dashboard/" class="text-purple-400 underline">Savings → Spending Control</a>.
                            </p>
                            <button disabled class="mt-5 w-full py-2.5 rounded-xl bg-gray-700/60 text-gray-500 font-semibold text-sm cursor-not-allowed">
                                Save Expense — Blocked
                            </button>
                        </div>
                    </div>`;
            } else {
                isWarning = true;
                modalHtml = `
                    <div class="flex flex-col gap-4 md:flex-row">
                        <div class="flex-1 rounded-2xl border-2 border-yellow-500/60 bg-yellow-950/30 p-6">
                            <div class="flex items-center gap-2 mb-3">
                                <span class="text-yellow-400 text-xl">⚠</span>
                                <span class="text-yellow-400 font-bold text-base">Limit Warning</span>
                            </div>
                            <p class="text-sm text-gray-300 leading-relaxed">
                                This expense exceeds your <span class="font-semibold text-white">${breachText}</span> limit${data.breaches.length > 1 ? 's' : ''}.
                                The overspent amount <span class="font-bold text-yellow-300">will be deducted from your savings</span>.
                                You can still save it.
                            </p>
                            <div class="flex gap-3 mt-5">
                                <button type="button" class="w-full py-2.5 rounded-xl border border-white/10 hover:bg-white/5 text-light font-semibold text-sm transition-all" onclick="document.getElementById('limit-modal').classList.add('hidden');">
                                    Cancel
                                </button>
                                <button id="confirm-save-btn" class="w-full py-2.5 rounded-xl bg-gradient-to-r from-purple-600 to-purple-800 hover:from-purple-700 hover:to-purple-900 text-white font-semibold text-sm transition-all">
                                    Save Expense Anyway
                                </button>
                            </div>
                        </div>
                    </div>`;
            }
        }

        if (!isBlocked && !isWarning) {
            expenseForm.submit();
            return;
        }

        modalContent.innerHTML = modalHtml;

        if (isWarning) {
            document.getElementById('confirm-save-btn').addEventListener('click', () => {
                document.getElementById('force-save-input').value = '1';
                limitModal.classList.add('hidden');
                expenseForm.submit();
            });
        }

        limitModal.classList.remove('hidden');
    })
    .catch(() => {
        expenseForm.submit();
    });
});

document.getElementById('modal-close-btn').addEventListener('click', () => {
    limitModal.classList.add('hidden');
});

limitModal.addEventListener('click', function(e) {
    if (e.target === limitModal) limitModal.classList.add('hidden');
});
</script>
{% endblock js %}
