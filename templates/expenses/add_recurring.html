{% extends "base.html" %}
{% load static %}
{% block title %}Add Recurring Expense{% endblock %}
{% block page_title %}Add Recurring Expense{% endblock %}

{% block content %}
<div class="max-w-[480px] mx-auto mt-8">
    <div class="mb-6">
        <a href="{% url 'recurring_expenses' %}" class="flex items-center gap-2 text-muted hover:text-light transition-colors text-sm font-medium w-fit">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Recurring
        </a>
    </div>

    <div class="glass-card p-8 sm:p-10 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-bl-full pointer-events-none"></div>

        <div class="relative z-10">
            <h2 class="text-2xl font-bold text-light mb-8 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center text-primary">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </div>
                New Recurring
            </h2>

            <form action="{% url 'add_recurring' %}" method="post" class="space-y-6">

                {% csrf_token %}
                
                <div class="relative">
                    <input type="number" step="0.01" name="amount" id="amountField" required
                        class="form-input block w-full px-4 pt-6 pb-2 text-light bg-surface-elevated border border-white/10 rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer" placeholder=" " />
                    <label for="amountField" class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3">Amount</label>
                </div>

                <div class="relative">
                    <input type="text" name="description" id="description-input" required
                        class="form-input block w-full px-4 pt-6 pb-2 text-light bg-surface-elevated border border-white/10 rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer" placeholder=" " />
                    <label for="description-input" class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3">Description</label>
                    <div id="loading-indicator" class="absolute right-4 top-1/2 -translate-y-1/2" style="display: none;">
                        <img class="loader w-5 h-5" src="{% static 'img/loader.gif' %}" alt="Loading...">
                    </div>
                </div>

                <div class="relative">
                    <input type="text" name="category" id="category-input" required
                        class="form-input block w-full px-4 pt-6 pb-2 text-light bg-surface-elevated border border-white/10 rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer" placeholder=" " />
                    <label for="category-input" class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3">Category (Auto-predicted)</label>
                </div>

                <div class="relative">
                    <select name="frequency" id="frequencyField" required class="form-input block w-full px-4 pt-6 pb-2 text-light bg-surface-elevated border border-white/10 rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer">
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                    </select>
                    <label for="frequencyField" class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-focus:scale-75 peer-focus:-translate-y-3">Frequency</label>
                </div>

                <div class="relative">
                    <input type="date" name="next_due_date" id="dateField" required
                        class="form-input block w-full px-4 pt-6 pb-2 text-light bg-surface-elevated border border-white/10 rounded-lg appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary peer" placeholder=" " />
                    <label for="dateField" class="absolute text-muted duration-300 transform -translate-y-3 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-3">First/Next Due Date</label>
                </div>

                <button type="submit" class="submit-btn w-full py-3.5 px-4 bg-gradient-to-r from-primary to-[#6D28D9] hover:from-[#6D28D9] hover:to-[#5B21B6] text-white font-medium rounded-lg transition-all shadow-lg shadow-primary/25 focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-dark mt-4">
                    Save Recurring Expense
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock content %}

{% block js %}
<script>
// Function to predict category based on description
function predictCategory() {
    const description = document.getElementById('description-input').value;
    if (description) {
        document.getElementById('loading-indicator').style.display = 'block';

        const formData = new FormData();
        formData.append('description', description);
        
        fetch('{% url "predict-category" %}', {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            },
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('loading-indicator').style.display = 'none';

            const categoryInput = document.getElementById('category-input');
            
            categoryInput.value = "Predicting...";
            categoryInput.classList.add('text-success');
            categoryInput.classList.remove('text-light');
            
            setTimeout(() => {
                categoryInput.value = data.predicted_category;
                categoryInput.classList.remove('text-success');
                categoryInput.classList.add('text-primary', 'font-semibold');
            }, 500);
        })
        .catch(error => {
            document.getElementById('loading-indicator').style.display = 'none';
        });
    }
}

// Function to get the CSRF token from cookies
function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
}

// Debounce wrapper for prediction
let predictTimeout;
const descriptionInput = document.getElementById('description-input');
if(descriptionInput) {
    descriptionInput.addEventListener('input', () => {
        clearTimeout(predictTimeout);
        predictTimeout = setTimeout(predictCategory, 800); // 800ms to avoid too many requests
    });
}
</script>
{% endblock js %}
